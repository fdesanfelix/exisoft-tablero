# GitHub Actions: build + deploy a GitHub Pages.
# Se dispara con cada push a main. La URL queda en
#   https://<tu-usuario>.github.io/<nombre-del-repo>/
name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  # Permite re-deploy manual desde la pestaña Actions
  workflow_dispatch:

# Permisos mínimos para que la action publique a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita concurrencia: si llega un push nuevo mientras corre, cancela el viejo
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
